<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAGI</title>
    <link rel="stylesheet" href="document.css">
    <meta name="discription" content="magi system from eva">
</head>
<body data-loading="true">
    <h2 class="magi-logo" contenteditable="true" spellcheck="false">MAGI</h2>
    <div class="magi-box">
        <header>
            <h1 contenteditable="true" spellcheck="false">提訴</h1>
            <h1 contenteditable="true" spellcheck="false">決議</h1>
        </header>
        <div class="config-box">
            <h4>
                Code:
                <b class="code"></b>
            </h4>
            <p>
                File:
                <b class="file">MAGI_SYS</b>
            </p>
            <p>
                Volume:
                <b class="volume" data-text="66"></b>
            </p>
            <p>
                EX_MODE:
                <b class="ex-mode"></b>
            </p>
            <p>
                Priority:
                <b class="priority" data-text="AAA"></b>
            </p>
            <p>
                Sound:
                <b class="sound"></b>
            </p>
            <!-- NEW SETTINGS TO CHANGE VOTE TEXT -->
            <p>
                Text Accept:
                <b class="text-accept">承認</b>
            </p>
            <p>
                Text Reject:
                <b class="text-reject">否定</b>
            </p>
            <!-- END NEW SETTINGS -->
            <b class="reset">RESET</b>
        </div>
        <div class="final-vote-status"></div>
        <div class="magi-list">
            <div class="magi-item melchior">
                <h3 contenteditable="true" spellcheck="false">MELCHIOR</h3>
                <h2></h2>
            </div>
            <div class="magi-item malthasar">
                <h2></h2>
                <h3 contenteditable="true" spellcheck="false">BALTHASAR</h3>
            </div>
            <div class="magi-item casper">
                <h3 contenteditable="true" spellcheck="false">CASPER</h3>
                <h2></h2>
            </div>
        </div>
        <footer>
            <p>
                <a href="../cat.html">Cat</a>
                ·
                <a href="../filesystem.html">File System</a>
            </p>
        </footer>
    </div>
    <script src="document.js"></script>
</body>
</html>
